name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-assets:
    runs-on: windows-2022
    env:
      COOLSYNTH_RUNNER_IMAGE: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build and test
        shell: pwsh
        run: ./scripts/ci/BuildAndTest.ps1 -Configuration Release -RunTests $true

      - name: Package release artefacts
        shell: pwsh
        run: ./scripts/ci/PackageRelease.ps1 -Configuration Release -TagName "${{ github.ref_name }}"

      - name: Upload diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-release-${{ github.ref_name }}-diagnostics
          if-no-files-found: warn
          retention-days: 7
          path: |
            build/ci-release/logs/**
            build/ci-release/Testing/ctest-results.xml
            build/ci-release/CoolSynth_artefacts/Release/Standalone/*.pdb

      - name: Upload package bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-release-${{ github.ref_name }}-packages
          if-no-files-found: error
          retention-days: 7
          path: build/ci-release/packages/**

  publish-release:
    needs: build-release-assets
    runs-on: windows-2022
    steps:
      - name: Download package bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: windows-release-${{ github.ref_name }}-packages
          path: release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-bundle/CoolSynth-windows-x64-standalone-${{ github.ref_name }}.zip
            release-bundle/CoolSynth-windows-x64-vst3-${{ github.ref_name }}.zip
            release-bundle/CoolSynth-windows-x64-sha256-${{ github.ref_name }}.txt
